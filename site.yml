---
# ============================================================
# site.yml - Main Playbook
# Creates 6 OpenShift VMs on vCenter (no template, ISO attach)
# Run with: ansible-playbook site.yml --ask-vault-pass
# ============================================================

- name: "Deploy OpenShift VMs on vCenter"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars.yml
    - vault.yml       # Encrypted: vcenter_username, vcenter_password

  tasks:
    # --------------------------------------------------------
    # PHASE 0: Create Installation Dir 
    # --------------------------------------------------------
    - name: "Create VM Folder if not exists"
      community.vmware.vcenter_folder:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs }}"
        datacenter: "{{ vcenter_datacenter }}"
        folder_name: "NBE-OCP"
        folder_type: vm
        state: present

    # --------------------------------------------------------
    # PHASE 1: Create all VMs
    # --------------------------------------------------------
    - name: "PHASE 1 - Create VMs"
      ansible.builtin.debug:
        msg: "Starting VM creation for {{ vms | length }} machines..."

    - name: "Create VM for each entry"
      ansible.builtin.include_tasks: tasks/create_vm.yml
      loop: "{{ vms }}"
      loop_control:
        label: "{{ vm_name_prefix }}-{{ item.role }}{{ item.index }}"

    # --------------------------------------------------------
    # PHASE 2: Add disks (idempotent, safe to re-run)
    # --------------------------------------------------------
    - name: "PHASE 2 - Add disks to all VMs"
      ansible.builtin.debug:
        msg: "Adding 2 disks to each VM..."

    - name: "Add disks to each VM"
      ansible.builtin.include_tasks: tasks/add_disks.yml
      loop: "{{ vms }}"
      loop_control:
        label: "{{ vm_name_prefix }}-{{ item.role }}{{ item.index }}"

    # --------------------------------------------------------
    # PHASE 3: Apply advanced parameters per VM
    # --------------------------------------------------------
    - name: "PHASE 3 - Apply advanced VM parameters"
      ansible.builtin.debug:
        msg: "Applying advanced parameters to each VM..."

    - name: "Set advanced params for each VM"
      ansible.builtin.include_tasks: tasks/set_advanced_params.yml
      loop: "{{ vms }}"
      loop_control:
        label: "{{ vm_name_prefix }}-{{ item.role }}{{ item.index }}"

    # --------------------------------------------------------
    # PHASE 4 - Collect MAC Addresses
    # --------------------------------------------------------
    - name: "PHASE 4 - Collect MAC addresses of all VMs"
      community.vmware.vmware_guest_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs }}"
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ vm_name_prefix }}-{{ item.role }}{{ item.index }}"
      register: vm_info
      loop: "{{ vms }}"
      loop_control:
        label: "{{ vm_name_prefix }}-{{ item.role }}{{ item.index }}"

    - name: "Display and save MAC addresses"
      ansible.builtin.debug:
        msg: "{{ vm_name_prefix }}-{{ item.item.role }}{{ item.item.index }} → {{ item.instance.hw_eth0.macaddress | default('N/A') }}"
      loop: "{{ vm_info.results }}"
      loop_control:
        label: "{{ item.item.role }}{{ item.item.index }}"

    - name: "Save MAC addresses to file"
      ansible.builtin.copy:
        content: |
          {% for result in vm_info.results %}
          {{ vm_name_prefix }}-{{ result.item.role }}{{ result.item.index }}: {{ result.instance.hw_eth0.macaddress | default('N/A') }}
          {% endfor %}
        dest: "/home/saad/ocp-vcenter-ansible/mac_addresses.txt"
        force: true

    # --------------------------------------------------------
    # PHASE 5: PowerOn Bastion
    # --------------------------------------------------------
    - name: "PHASE 4 - Power On Bastion"
      ansible.builtin.pause:
        prompt: "Do you want to power on Bastion VM? (yes/no)"
      register: poweron_answer

    - name: "Power On Bastion"
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs }}"
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ vm_name_prefix }}-Bastion1"
        state: powered-on
      when: poweron_answer.user_input | lower == "yes"

    - name: "Waiting — complete Bastion OS installation then press Enter"
      ansible.builtin.pause:
        prompt: |
          ======================================================
          Bastion VM is powered on.
          1. Complete RHEL9 installation via vSphere console
          2. Assign a static IP to Bastion
          3. Once Bastion is up, enter its IP address below
          ======================================================
          Enter Bastion IP address
      register: bastion_ip_input
 
    - name: "Save Bastion IP for later tasks"
      ansible.builtin.set_fact:
        bastion_ip: "{{ bastion_ip_input.user_input }}"

    - name: "Confirm Bastion IP saved"
      ansible.builtin.debug:
        msg: "Bastion IP set to: {{ bastion_ip }} — ready for next tasks"

    - name: "Save Bastion IP to file"
      ansible.builtin.copy:
        content: "bastion_ip: {{ bastion_ip }}\n"
        dest: "/home/saad/ocp-vcenter-ansible/bastion_ip.txt"
        force: true

    - name: "Test connectivity to Bastion"
      ansible.builtin.wait_for:
        host: "{{ bastion_ip }}"
        port: 22
        timeout: 300
        msg: "Waiting for Bastion SSH to become available..."

    # --------------------------------------------------------
    # PHASE 6 - Configure Bastion
    # --------------------------------------------------------
    - name: "PHASE 6 - Configure Bastion"
      ansible.builtin.debug:
        msg: "Starting Bastion configuration on {{ bastion_ip }}..."

    - name: "Add Bastion to in-memory inventory"
      ansible.builtin.add_host:
        name: "bastion"
        ansible_host: "{{ bastion_ip }}"
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

- name: "Configure Bastion Server"
  hosts: bastion
  gather_facts: true

  vars_files:
    - vars.yml
    - vault.yml

  tasks:
    - name: "Run Bastion configuration tasks"
      ansible.builtin.include_tasks: tasks/configure_bastion.yml
    
    # --------------------------------------------------------
    # PHASE 7: Summary
    # --------------------------------------------------------
    - name: "Deployment Summary"
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop:
        - "=================================================="
        - "  OpenShift VM Deployment Complete"
        - "=================================================="
        - "{% for vm in vms %}  ✔ {{ vm_name_prefix }}-{{ vm.role }}{{ vm.index }} | CPU: {{ vm.num_cpus }} | RAM: {{ vm.memory_mb }}MB | Disk1: {{ vm.disk1_size_gb }}GB | Disk2: {{ vm.disk2_size_gb }}GB{% endfor %}"
        - "=================================================="
