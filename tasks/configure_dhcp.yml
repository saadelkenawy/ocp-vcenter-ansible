---
# ============================================================
# tasks/configure_dhcp.yml
# Configure DHCP Server on Bastion
# ============================================================

# --------------------------------------------------------
# 1 - Load bastion_ip from file
# --------------------------------------------------------
- name: "Load bastion_ip from file"
  ansible.builtin.slurp:
    src: /home/{{ local_user }}/ocp-vcenter-ansible/bastion_ip.txt
  register: bastion_ip_file
  delegate_to: localhost

- name: "Set bastion_ip fact"
  ansible.builtin.set_fact:
    bastion_ip: "{{ bastion_ip_file.content | b64decode | regex_search('bastion_ip: (.+)', '\\1') | first | trim }}"
  delegate_to: localhost

- name: "Share bastion_ip with bastion host"
  ansible.builtin.set_fact:
    bastion_ip: "{{ hostvars['localhost']['bastion_ip'] }}"


# --------------------------------------------------------
# 2 - Load MAC addresses from file
# --------------------------------------------------------
- name: "Load MAC addresses from file"
  ansible.builtin.slurp:
    src: /home/{{ local_user }}/ocp-vcenter-ansible/mac_addresses.txt
  register: mac_file
  delegate_to: localhost

- name: "Copy mac_addresses.txt to bastion"
  ansible.builtin.copy:
    src: "/home/{{ local_user }}/ocp-vcenter-ansible/mac_addresses.txt"
    dest: "/tmp/mac_addresses.txt"
    mode: "0644"

- name: "Parse MAC addresses using shell"
  ansible.builtin.shell: |
    python3 -c "
    import json
    macs = {}
    with open('/tmp/mac_addresses.txt') as f:
        for line in f:
            line = line.strip()
            if ':' in line:
                parts = line.split(': ', 1)
                if len(parts) == 2:
                    macs[parts[0].strip()] = parts[1].strip()
    print(json.dumps(macs))
    "
  register: mac_parse_result
  changed_when: false

- name: "Set MAC addresses fact"
  ansible.builtin.set_fact:
    mac_addresses: "{{ mac_parse_result.stdout | from_json }}"
  

# --------------------------------------------------------
# 3 - Gather network info from bastion
# --------------------------------------------------------
- name: "Get default gateway"
  ansible.builtin.shell: "ip route | grep default | awk '{print $3}'"
  register: gateway_result
  changed_when: false

- name: "Set broadcast address"
  ansible.builtin.set_fact:
    bastion_bc: "{{ bastion_ip | regex_replace('(\\d+\\.\\d+\\.\\d+)\\.\\d+', '\\1.255') }}"

- name: "Set network facts"
  ansible.builtin.set_fact:
    bastion_gateway: "{{ gateway_result.stdout | trim }}"
    subnet_network: "{{ bastion_ip | regex_replace('(\\d+\\.\\d+\\.\\d+)\\.\\d+', '\\1.0') }}"
    subnet_netmask: "255.255.255.0"

- name: "Display gathered network info"
  ansible.builtin.debug:
    msg:
      - "Bastion IP  : {{ bastion_ip }}"
      - "Gateway     : {{ bastion_gateway }}"
      - "Broadcast   : {{ bastion_bc }}"
      - "Subnet      : {{ subnet_network }}"

# --------------------------------------------------------
# 4 - Ask for domain name
# --------------------------------------------------------
- name: "Ask for domain name"
  ansible.builtin.pause:
    prompt: "Enter domain name (e.g. ocp.gts)"
  register: domain_input
  until: domain_input.user_input | trim != ""
  retries: 5
  delay: 0

- name: "Set domain fact"
  ansible.builtin.set_fact:
    dhcp_domain: "{{ domain_input.user_input | trim }}"

# --------------------------------------------------------
# 5 - Build reserved IP list from MAC addresses
#     Skip Bastion, assign IPs starting from .50
# --------------------------------------------------------
- name: "Build VM reserved list"
  ansible.builtin.set_fact:
    vm_reservations: >-
      {{
        mac_addresses | dict2items
        | rejectattr('key', 'search', 'Bastion')
        | list
      }}

# --------------------------------------------------------
# 6 - Create /etc/dhcp/dhcpd.conf
# --------------------------------------------------------
- name: "Copy reservation generator script to bastion"
  ansible.builtin.copy:
    dest: /tmp/gen_dhcp.py
    content: |
      import json, sys
      macs = json.load(sys.stdin)
      bastion_ip = sys.argv[1]
      domain = sys.argv[2]
      prefix = '.'.join(bastion_ip.split('.')[:3])
      index = 50
      for vm_name, mac in macs.items():
          if 'Bastion' in vm_name:
              continue
          short_name = vm_name.split('-')[-1].lower()
          ip = prefix + '.' + str(index)
          print('host ' + vm_name + ' {')
          print('  hardware ethernet ' + mac + ';')
          print('  fixed-address ' + ip + ';')
          print('  option host-name "' + short_name + '.' + domain + '";')
          print('}')
          index += 1

- name: "Generate DHCP static reservations"
  ansible.builtin.shell: |
    echo '{{ mac_addresses | to_json }}' | python3 /tmp/gen_dhcp.py {{ bastion_ip }} {{ dhcp_domain }}
  register: dhcp_reservations
  changed_when: false

- name: "Configure /etc/dhcp/dhcpd.conf"
  ansible.builtin.copy:
    dest: /etc/dhcp/dhcpd.conf
    owner: root
    group: root
    mode: "0644"
    force: true
    content: |
      # -------------------------------
      # Global options
      # -------------------------------
      option domain-name "{{ dhcp_domain }}";
      option domain-name-servers {{ bastion_ip }};
      option routers {{ bastion_gateway }};

      default-lease-time 600;
      max-lease-time 7200;
      authoritative;
      # -------------------------------
      # Subnet Configuration
      # -------------------------------
      subnet {{ subnet_network }} netmask {{ subnet_netmask }} {
        range {{ bastion_ip | regex_replace('(\d+\.\d+\.\d+)\.\d+', '\1.100') }} {{ bastion_ip | regex_replace('(\d+\.\d+\.\d+)\.\d+', '\1.200') }};
        option broadcast-address {{ bastion_bc }};
        option ntp-servers {{ bastion_ip }};
        default-lease-time 600;
        max-lease-time 7200;
      }

      # -------------------------------
      # Static IP Allocations
      # -------------------------------
      {{ dhcp_reservations.stdout }}
# --------------------------------------------------------
# 7 - Enable and restart dhcpd
# --------------------------------------------------------
- name: "Enable and restart dhcpd"
  ansible.builtin.systemd:
    name: dhcpd
    state: restarted
    enabled: true

- name: "Check dhcpd status"
  ansible.builtin.command: systemctl status dhcpd
  register: dhcpd_status
  changed_when: false
  ignore_errors: true

- name: "DHCP Configuration Summary"
  ansible.builtin.debug:
    msg:
      - "=================================================="
      - "  DHCP Configuration Complete"
      - "=================================================="
      - "  Domain   : {{ dhcp_domain }}"
      - "  Subnet   : {{ subnet_network }}/24"
      - "  Gateway  : {{ bastion_gateway }}"
      - "  Broadcast: {{ bastion_bc }}"
      - "  Range    : {{ subnet_network | regex_replace('(\\d+\\.\\d+\\.\\d+)\\.0', '\\1.100') }} - {{ subnet_network | regex_replace('(\\d+\\.\\d+\\.\\d+)\\.0', '\\1.200') }}"
      - "=================================================="
