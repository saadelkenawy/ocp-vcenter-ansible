# --------------------------------------------------------
# 5 - Increment serial in zone files
# --------------------------------------------------------
- name: "Increment serial in forward zone"
  ansible.builtin.shell: |
    serial=$(grep -oP '\d{10}' /var/named/zones/{{ dns_domain }}.zone | head -1)
    new_serial=$((serial + 1))
    sed -i "s/$serial/$new_serial/" /var/named/zones/{{ dns_domain }}.zone
  changed_when: true

- name: "Increment serial in reverse zone"
  ansible.builtin.shell: |
    serial=$(grep -oP '\d{10}' /var/named/zones/{{ dns_domain }}.rev | head -1)
    new_serial=$((serial + 1))
    sed -i "s/$serial/$new_serial/" /var/named/zones/{{ dns_domain }}.rev
  changed_when: true

# --------------------------------------------------------
# 6 - Validate and restart named
# --------------------------------------------------------
- name: "Check named.conf syntax"
  ansible.builtin.command: named-checkconf /etc/named.conf
  changed_when: false

- name: "Check forward zone syntax"
  ansible.builtin.command: "named-checkzone {{ dns_domain }} /var/named/zones/{{ dns_domain }}.zone"
  changed_when: false

- name: "Check reverse zone syntax"
  ansible.builtin.command: "named-checkzone {{ bastion_ip.split('.')[2] }}.{{ bastion_ip.split('.')[1] }}.{{ bastion_ip.split('.')[0] }}.in-addr.arpa /var/named/zones/{{ dns_domain }}.rev"
  changed_when: false

- name: "Restart named"
  ansible.builtin.systemd:
    name: named
    state: restarted

# --------------------------------------------------------
# 7 - Test DNS resolution
# --------------------------------------------------------
- name: "Test A record resolution"
  ansible.builtin.command: "dig @{{ bastion_ip }} {{ item.hostname }} +short"
  register: dig_result
  changed_when: false
  loop: "{{ dhcp_host_list }}"
  loop_control:
    label: "{{ item.hostname }}"

- name: "DNS A Record Test Results"
  ansible.builtin.debug:
    msg: "{{ item.item.hostname }} → {{ item.stdout | default('FAILED') }}"
  loop: "{{ dig_result.results }}"
  loop_control:
    label: "{{ item.item.hostname }}"
