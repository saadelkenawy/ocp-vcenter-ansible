---
# ============================================================
# vCenter Connection Settings (credentials stored in vault.yml)
# ============================================================
vcenter_hostname: "10.20.20.200"
vcenter_datacenter: "GTS_KSA"
vcenter_datastore: "DATASTORE_4_HDD"
esxi_hostname: "10.20.20.21"

# ============================================================
# ISO Settings (must exist in vCenter datastore)
# ============================================================
iso_datastore: "DATASTORE_4_HDD"
iso_path: "[DATASTORE_4_HDD] Enawy-Infrasturcture ISOs/RHCOS-4.20/rhcos-4.20.12-x86_64-live-iso.x86_64.iso"  
so_path_rhel9: "Enawy-Infrasturcture ISOs/rhel-9.6-x86_64-dvd.iso"

# ============================================================
# VM Naming Convention
# Server names will be: {{ vm_name_prefix }}-{{ vm_role }}{{ index }}
# Example: Enawy-OCP-Test-Master1, Enawy-OCP-Test-Worker1
# ============================================================
vm_name_prefix: "Enawy-OCP-Test"

# ============================================================
# VM Definitions (one entry per VM)
# ============================================================
vms:
  - role: "Master"
    index: 1
    num_cpus: 8
    memory_mb: 16384
    disk1_size_gb: 120
    disk2_size_gb: 200
    network: "NET-192.168.150.0"
    guest_id: "coreos64Guest"
    hardware_version: "vmx-21"
  - role: "Master"
    index: 2
    num_cpus: 8
    memory_mb: 16384
    disk1_size_gb: 120
    disk2_size_gb: 200
    network: "NET-192.168.150.0"
    guest_id: "coreos64Guest"
    hardware_version: "vmx-19"
  - role: "Master"
    index: 3
    num_cpus: 8
    memory_mb: 16384
    disk1_size_gb: 120
    disk2_size_gb: 200
    network: "NET-192.168.150.0"
    guest_id: "coreos64Guest"
    hardware_version: "vmx-19"
  - role: "Worker"
    index: 1
    num_cpus: 16
    memory_mb: 32768
    disk1_size_gb: 120
    disk2_size_gb: 500
    network: "NET-192.168.150.0"
    guest_id: "coreos64Guest"
    hardware_version: "vmx-19"
  - role: "Worker"
    index: 2
    num_cpus: 16
    memory_mb: 32768
    disk1_size_gb: 120
    disk2_size_gb: 500
    network: "NET-192.168.150.0"
    guest_id: "coreos64Guest"
    hardware_version: "vmx-19"
  - role: "Worker"
    index: 3
    num_cpus: 16
    memory_mb: 32768
    disk1_size_gb: 120
    disk2_size_gb: 500
    network: "NET-192.168.150.0"
    guest_id: "coreos64Guest"
    hardware_version: "vmx-21"  
  - role: "bootstrap"
    index: 1
    num_cpus: 8
    memory_mb: 16384
    disk1_size_gb: 120
    disk2_size_gb: 0    
    network: "NET-192.168.150.0"
    guest_id: "coreos64Guest"
    hardware_version: "vmx-21" 
  - role: "Bastion"
    index: 1
    num_cpus: 4
    memory_mb: 8192
    disk1_size_gb: 120
    disk2_size_gb: 0    
    network: "NET-192.168.150.0"
    guest_id: "rhel9_64Guest"
    hardware_version: "vmx-21" 
    

# ============================================================
# Advanced VM Parameters (applied to every VM)
# ============================================================
vm_advanced_parameters:
  disk.EnableUUID: "TRUE"      # Required for OCP persistent volumes
  stealclock.enable:  "TRUE"                 
  ethernet0.wakeOnLanEnabled: "FALSE"
  hpet0.present: "FALSE"
  mem.hotadd: "FALSE"
  cpu.hotadd: "FALSE"
  tools.syncTime: "FALSE"                    # OCP manages its own time
  sched.cpu.latencySensitivity: "normal"
  numa.autosize.vcpu.maxPerVirtualNode: "1"
  guestinfo.ignition.config.data.encoding: "base64"  # For CoreOS ignition
